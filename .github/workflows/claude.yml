name: Claude Code Review

# Triggers on PR events to provide automated code review using Claude
# Custom instructions: Use mcp_playwright tools to launch a browser and interact with the app
# for testing UI changes, verifying component functionality, and testing the preview feature.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Provide a thorough code review of the changes in this PR.
            Focus on:
            - Code correctness and potential bugs
            - Performance and efficiency improvements
            - Best practices and code quality
            - TypeScript type safety (if applicable)
            - Testing coverage for new/changed functionality

            Be constructive and provide specific suggestions for improvements.
          include_fix_links: true
          use_sticky_comment: true
