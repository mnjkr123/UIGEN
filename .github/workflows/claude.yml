name: Claude Code Review

# Custom Instructions:
# If needed, use the mcp_playwright set of tools to launch a browser and interact with the app.
# This is helpful for testing UI changes, verifying component functionality, checking live preview behavior,
# and testing the chat interface and code generation.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Claude
        uses: anthropics/claude-code-review-action@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
